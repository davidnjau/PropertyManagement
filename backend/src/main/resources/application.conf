ktor {
    deployment {
        port = 3001
        port = ${?PORT}
    }
    application {
        modules = [ com.buildagent.backend.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/buildagent_dev"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "buildagent"
    user = ${?DB_USER}
    password = "buildagent_dev"
    password = ${?DB_PASSWORD}
    maxPoolSize = 20
}

redis {
    url = "redis://localhost:6379"
    url = ${?REDIS_URL}
}

kafka {
    bootstrapServers = "localhost:9092"
    bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
    groupId = "buildagent-backend"
    groupId = ${?KAFKA_GROUP_ID}
    clientId = "buildagent-producer"
}

auth0 {
    domain = "your-tenant.auth0.com"
    domain = ${?AUTH0_DOMAIN}
    audience = "https://api.buildagent.io"
    audience = ${?AUTH0_AUDIENCE}
    namespace = "https://buildagent.io/"
    namespace = ${?AUTH0_NAMESPACE}
}

jwt {
    secret = "change-me-use-a-long-random-secret-in-production"
    secret = ${?JWT_SECRET}
}

cors {
    allowedHosts = ["localhost:8080", "localhost:5173"]
}
