openapi: "3.0.3"
info:
  title: BuildAgent API
  description: |
    Multi-tenant property management API for building agents, property owners, and tenants.

    ## Authentication
    Two auth schemes are supported:
    - **Local Auth** — used for `/auth/register`, `/auth/login`, and `/auth/me`. Issues a signed HMAC256 JWT.
    - **Auth0** — used for all other routes. Validated against Auth0 JWKS endpoint.

    Obtain a token via `POST /api/v1/auth/login` and supply it as `Authorization: Bearer <token>`.
  version: "1.0.0"
  contact:
    name: BuildAgent

servers:
  - url: http://localhost:3001
    description: Local development

tags:
  - name: Health
    description: Server health check
  - name: Auth
    description: Registration, login, and user profile
  - name: Buildings
    description: Building portfolio management
  - name: Units
    description: Unit management within buildings
  - name: Tenants
    description: Tenant records
  - name: Leases
    description: Lease lifecycle management
  - name: Payments
    description: Rent, bond, and fee payment ledger
  - name: Maintenance
    description: Maintenance request tracking
  - name: Dashboard
    description: Portfolio overview metrics

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Resource UUID

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Auth ──────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [agencyName, fullName, email, password]
      properties:
        agencyName:
          type: string
          example: "Sunrise Property Group"
        fullName:
          type: string
          example: "Jane Smith"
        email:
          type: string
          format: email
          example: "jane@sunriseproperty.com.au"
        password:
          type: string
          format: password
          minLength: 8
          example: "S3cur3P@ssw0rd"
        phone:
          type: string
          nullable: true
          example: "+61412345678"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "jane@sunriseproperty.com.au"
        password:
          type: string
          format: password
          example: "S3cur3P@ssw0rd"

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agencyId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        role:
          type: string
          enum: [ADMIN, AGENT, CLIENT, TENANT]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token (30-day expiry)
        user:
          $ref: '#/components/schemas/AuthUser'

    # ── Buildings ─────────────────────────────────────────────────────────────
    CreateBuildingRequest:
      type: object
      required: [address, suburb, state, postcode]
      properties:
        clientId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
          example: "Harbour View Apartments"
        address:
          type: string
          example: "12 Marine Parade"
        suburb:
          type: string
          example: "Manly"
        state:
          type: string
          example: "NSW"
        postcode:
          type: string
          example: "2095"
        country:
          type: string
          default: "Australia"
        buildingType:
          type: string
          enum: [RESIDENTIAL, COMMERCIAL, MIXED]
          default: RESIDENTIAL
        yearBuilt:
          type: integer
          nullable: true
          example: 2005
        notes:
          type: string
          nullable: true

    Building:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agencyId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
        address:
          type: string
        suburb:
          type: string
        state:
          type: string
        postcode:
          type: string
        country:
          type: string
        buildingType:
          type: string
          enum: [RESIDENTIAL, COMMERCIAL, MIXED]
        yearBuilt:
          type: integer
          nullable: true
        unitCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BuildingSummaryData:
      type: object
      properties:
        total:
          type: integer
        occupied:
          type: integer
        vacant:
          type: integer
        occupancyRate:
          type: number
          format: double
        monthlyIncome:
          type: number
          format: double

    # ── Units ─────────────────────────────────────────────────────────────────
    CreateUnitRequest:
      type: object
      required: [unitNumber]
      properties:
        unitNumber:
          type: string
          example: "4A"
        floor:
          type: integer
          nullable: true
        bedrooms:
          type: integer
          default: 0
        bathrooms:
          type: integer
          default: 0
        parkingSpaces:
          type: integer
          default: 0
        areaSqm:
          type: number
          format: double
          nullable: true
        rentAmount:
          type: number
          format: double
          nullable: true
          example: 2400.00
        rentFrequency:
          type: string
          enum: [WEEKLY, FORTNIGHTLY, MONTHLY]
          default: MONTHLY
        notes:
          type: string
          nullable: true

    BuildingUnit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid
        unitNumber:
          type: string
        floor:
          type: integer
          nullable: true
        bedrooms:
          type: integer
        bathrooms:
          type: integer
        parkingSpaces:
          type: integer
        areaSqm:
          type: number
          format: double
          nullable: true
        rentAmount:
          type: number
          format: double
          nullable: true
        rentFrequency:
          type: string
          enum: [WEEKLY, FORTNIGHTLY, MONTHLY]
        status:
          type: string
          enum: [VACANT, OCCUPIED, UNDER_MAINTENANCE, OFF_MARKET]
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Tenants ───────────────────────────────────────────────────────────────
    CreateTenantRequest:
      type: object
      required: [fullName, email]
      properties:
        fullName:
          type: string
          example: "Michael Johnson"
        email:
          type: string
          format: email
          example: "michael@example.com"
        phone:
          type: string
          nullable: true
          example: "+61400123456"
        dateOfBirth:
          type: string
          format: date
          nullable: true
        idType:
          type: string
          nullable: true
          example: "Passport"
        idReference:
          type: string
          nullable: true
          example: "PA1234567"
        emergencyContactName:
          type: string
          nullable: true
        emergencyContactPhone:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agencyId:
          type: string
          format: uuid
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Leases ────────────────────────────────────────────────────────────────
    CreateLeaseRequest:
      type: object
      required: [unitId, tenantId, startDate, rentAmount, bondAmount]
      properties:
        unitId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
          example: "2024-02-01"
        endDate:
          type: string
          format: date
          nullable: true
          example: "2025-01-31"
        rentAmount:
          type: number
          format: double
          example: 2400.00
        rentFrequency:
          type: string
          enum: [WEEKLY, FORTNIGHTLY, MONTHLY]
          default: MONTHLY
        bondAmount:
          type: number
          format: double
          example: 4800.00
        paymentDay:
          type: integer
          default: 1
          example: 1
        specialConditions:
          type: string
          nullable: true
        moveInDate:
          type: string
          format: date
          nullable: true

    TerminateLeaseRequest:
      type: object
      required: [moveOutDate]
      properties:
        moveOutDate:
          type: string
          format: date
          example: "2025-01-31"

    Lease:
      type: object
      properties:
        id:
          type: string
          format: uuid
        unitId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          nullable: true
        rentAmount:
          type: number
          format: double
        rentFrequency:
          type: string
          enum: [WEEKLY, FORTNIGHTLY, MONTHLY]
        bondAmount:
          type: number
          format: double
        bondLodged:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, PERIODIC, EXPIRING_SOON, EXPIRED, VACATED, TERMINATED]
        computedStatus:
          type: string
          enum: [ACTIVE, PERIODIC, EXPIRING_SOON, EXPIRED, VACATED, TERMINATED]
          nullable: true
        paymentDay:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Payments ──────────────────────────────────────────────────────────────
    RecordPaymentRequest:
      type: object
      required: [leaseId, amount, paymentType, periodFrom, periodTo]
      properties:
        leaseId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
          example: 2400.00
        paymentType:
          type: string
          enum: [RENT, BOND, WATER, FEE, OTHER]
        status:
          type: string
          enum: [PENDING, RECEIVED, OVERDUE, PARTIAL, WAIVED]
          default: RECEIVED
        periodFrom:
          type: string
          format: date
          example: "2024-02-01"
        periodTo:
          type: string
          format: date
          example: "2024-02-29"
        referenceNo:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        paymentDate:
          type: string
          format: date
          nullable: true

    AdjustPaymentRequest:
      type: object
      required: [amount, reason]
      properties:
        amount:
          type: number
          format: double
          example: -150.00
        reason:
          type: string
          example: "Water usage credit"
        notes:
          type: string
          nullable: true

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        leaseId:
          type: string
          format: uuid
        agencyId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        paymentType:
          type: string
          enum: [RENT, BOND, WATER, FEE, OTHER]
        status:
          type: string
          enum: [PENDING, RECEIVED, OVERDUE, PARTIAL, WAIVED]
        periodFrom:
          type: string
          format: date
        periodTo:
          type: string
          format: date
        referenceNo:
          type: string
          nullable: true
        isAdjustment:
          type: boolean
        adjustmentReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Maintenance ───────────────────────────────────────────────────────────
    CreateMaintenanceRequest:
      type: object
      required: [unitId, category, title, description]
      properties:
        unitId:
          type: string
          format: uuid
        category:
          type: string
          enum: [PLUMBING, ELECTRICAL, HVAC, STRUCTURAL, APPLIANCE, SECURITY, COMMON_AREA, OTHER]
        priority:
          type: string
          enum: [EMERGENCY, URGENT, ROUTINE, LOW]
          default: ROUTINE
        title:
          type: string
          example: "Leaking tap in kitchen"
        description:
          type: string
          example: "Cold water tap dripping continuously, staining sink."

    UpdateMaintenanceRequest:
      type: object
      properties:
        status:
          type: string
          enum: [REPORTED, ASSESSED, ASSIGNED, IN_PROGRESS, COMPLETED, CLOSED, CANCELLED]
          nullable: true
        contractorName:
          type: string
          nullable: true
        contractorPhone:
          type: string
          nullable: true
        assignedDate:
          type: string
          format: date
          nullable: true
        attendedDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true

    CloseMaintenanceRequest:
      type: object
      required: [completedDate]
      properties:
        completedDate:
          type: string
          format: date
          example: "2024-02-10"
        invoiceReference:
          type: string
          nullable: true
        invoiceAmount:
          type: number
          format: double
          nullable: true
        notes:
          type: string
          nullable: true

    MaintenanceRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agencyId:
          type: string
          format: uuid
        unitId:
          type: string
          format: uuid
        category:
          type: string
          enum: [PLUMBING, ELECTRICAL, HVAC, STRUCTURAL, APPLIANCE, SECURITY, COMMON_AREA, OTHER]
        priority:
          type: string
          enum: [EMERGENCY, URGENT, ROUTINE, LOW]
        status:
          type: string
          enum: [REPORTED, ASSESSED, ASSIGNED, IN_PROGRESS, COMPLETED, CLOSED, CANCELLED]
        title:
          type: string
        description:
          type: string
        contractorName:
          type: string
          nullable: true
        slaTargetDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Dashboard ─────────────────────────────────────────────────────────────
    UnitStats:
      type: object
      properties:
        total:
          type: integer
        occupied:
          type: integer
        vacant:
          type: integer

    DashboardData:
      type: object
      properties:
        buildings:
          type: integer
        units:
          $ref: '#/components/schemas/UnitStats'
        occupancyRate:
          type: integer
          description: Percentage 0–100
        overduePayments:
          type: integer
        expiringLeases:
          type: integer
          description: Leases expiring within 60 days
        openMaintenance:
          type: integer
        slaBreached:
          type: integer

    # ── Shared ────────────────────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  # ── Health ───────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Server health check
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  ts:
                    type: string
                    format: date-time

  # ── Auth ─────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new agency and admin user
      description: Creates an agency, an ADMIN user, and returns a signed JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Email already registered or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthResponse'
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthUser'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Buildings ─────────────────────────────────────────────────────────────
  /api/v1/buildings:
    get:
      tags: [Buildings]
      summary: List buildings
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of buildings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Building'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        "401":
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Buildings]
      summary: Create a building
      description: Requires ADMIN or AGENT role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildingRequest'
      responses:
        "201":
          description: Building created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Building'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/buildings/{id}:
    get:
      tags: [Buildings]
      summary: Get a building by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        "200":
          description: Building detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Building'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/buildings/{id}/summary:
    get:
      tags: [Buildings]
      summary: Get occupancy and income summary for a building
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        "200":
          description: Building summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BuildingSummaryData'

  # ── Units ─────────────────────────────────────────────────────────────────
  /api/v1/buildings/{buildingId}/units:
    get:
      tags: [Units]
      summary: List units in a building
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: buildingId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of units
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BuildingUnit'

    post:
      tags: [Units]
      summary: Add a unit to a building
      description: Requires ADMIN or AGENT role.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: buildingId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnitRequest'
      responses:
        "201":
          description: Unit created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BuildingUnit'

  /api/v1/units/{id}:
    get:
      tags: [Units]
      summary: Get a unit by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        "200":
          description: Unit detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BuildingUnit'
        "404":
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Units]
      summary: Update a unit
      description: Requires ADMIN or AGENT role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUnitRequest'
      responses:
        "200":
          description: Unit updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BuildingUnit'

  # ── Tenants ───────────────────────────────────────────────────────────────
  /api/v1/tenants:
    get:
      tags: [Tenants]
      summary: List tenants
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

    post:
      tags: [Tenants]
      summary: Create a tenant
      description: Requires ADMIN or AGENT role.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tenant'

  /api/v1/tenants/{id}:
    get:
      tags: [Tenants]
      summary: Get a tenant by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Tenant'
        "404":
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Tenants]
      summary: Update a tenant
      description: Requires ADMIN or AGENT role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
